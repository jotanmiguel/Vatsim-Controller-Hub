name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    name: Generate Version
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.semver.outputs.semver }}
      tag: ${{ steps.semver.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate semantic version + tag
        id: semver
        uses: bitshifted/git-auto-semver@v1.1.0
        with:
          main_branch: main
          initial_version: 0.1.0
          create_tag: true
          tag_prefix: "v"

  build:
    name: Build Windows EXE
    needs: version
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tags are available
        run: git fetch --tags

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile src/main.py

      - name: Prepare release folder
        run: |
          mkdir release
          copy dist\main.exe release\MyApp-${{ needs.version.outputs.version }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Release ${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: release/*
