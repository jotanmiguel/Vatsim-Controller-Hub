name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout tagged version
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "__version__ = \"$VERSION\"" > src/version.py

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
          pip install pyinstaller

      - name: Create Windows version info file
        shell: python
        run: |
          from pathlib import Path

          version = "${{ steps.version.outputs.version }}"
          parts = version.split(".")

          while len(parts) < 4:
              parts.append("0")

          filevers = tuple(int(x) for x in parts)

          content = f"""
                    # UTF-8
                    VSVersionInfo(
                      ffi=FixedFileInfo(
                        filevers={filevers},
                        prodvers={filevers},
                        mask=0x3f,
                        flags=0x0,
                        OS=0x40004,
                        fileType=0x1,
                        subtype=0x0,
                        date=(0, 0)
                      ),
                      kids=[]
                    )
                    """

          Path("version_info.txt").write_text(content, encoding="utf-8")

      - name: Build executable
        run: |
          pyinstaller --onefile --name ControllerHub --version-file version_info.txt src/main.py

      - name: Prepare release file
        shell: pwsh
        run: |
          mkdir release
          Copy-Item dist\ControllerHub.exe release\ControllerHub-${{ steps.version.outputs.version }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release/*
