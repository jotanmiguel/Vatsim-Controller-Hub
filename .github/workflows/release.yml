name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.semver.outputs.version-string }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version + create tag
        id: semver
        uses: bitshifted/git-auto-semver@v1.1.0
        with:
          main_branch: main
          initial_version: 0.1.0
          create_tag: true
          tag_prefix: "v"

  build:
    needs: version
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        shell: bash
        run: |
          VERSION=${{ needs.version.outputs.version }}
          echo "__version__ = \"$VERSION\"" > src/version.py

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name ControllerHub src/main.py

      - name: Prepare release
        shell: pwsh
        run: |
          mkdir release
          copy dist\ControllerHub.exe release\ControllerHub-${{ needs.version.outputs.version }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release ${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: release/*
