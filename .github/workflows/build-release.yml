name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest version + create new tag
        id: version
        shell: bash
        run: |
          git fetch --tags

          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            VERSION="0.1.0"
          else
            VERSION=${LATEST_TAG#v}

            IFS='.' read -r major minor patch <<< "$VERSION"
            patch=$((patch + 1))
            VERSION="$major.$minor.$patch"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Generate version.py
        shell: bash
        run: |
          echo "VERSION = '${{ steps.version.outputs.version }}'" > src/version.py

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name ControllerHub src/main.py

      - name: Prepare release file
        shell: pwsh
        run: |
          mkdir release
          copy dist\ControllerHub.exe release\ControllerHub-${{ steps.version.outputs.version }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release/*
